name: Update Snapshots

# Manually dispatched to regenerate the Playwright visual baselines on
# ubuntu-latest (the CI platform). Download the `linux-snapshots` artifact and
# commit the linux PNGs alongside the darwin ones so the visual test can be
# enforced on CI.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Regenerate game visual snapshots
        run: pnpm exec playwright test game.spec.ts --update-snapshots
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: linux-snapshots
          path: e2e/game.spec.ts-snapshots/
          retention-days: 30
